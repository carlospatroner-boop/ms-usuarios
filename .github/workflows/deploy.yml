name: CI/CD Pipeline

on:
  push:
    branches:
      - env/kubernetes

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: carlospatronerboop
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: carlospatronerboop/ms-usuarios:latest

  deploy-to-aks:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: grupo-k8s-mexico
          cluster-name: cluster-uteq

      - name: Create Secrets
        run: |
          kubectl create secret generic db-secrets \
            --from-literal=password=${{ secrets.DB_PASSWORD }} \
            --dry-run=client -o yaml | kubectl apply -f -
          
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=https://index.docker.io/v1/ \
            --docker-username=carlospatronerboop \
            --docker-password=${{ secrets.DOCKER_PASSWORD }} \
            --docker-email=tu-email@ejemplo.com \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to AKS
        run: |
          # Reemplazamos la variable de entorno en el deployment.yaml
          sed -i "s/\${AZURE_DB_HOST}/${{ secrets.AZURE_DB_HOST }}/g" k8s/deployment.yaml
          
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml