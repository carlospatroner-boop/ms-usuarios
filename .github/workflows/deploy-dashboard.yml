name: Deploy Dashboard (Python)

on:
  push:
    branches:
      - env/kubernetes
    paths:
      - 'ms-dashboard/**' # Solo se dispara si cambias algo en la carpeta del dashboard

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: carlospatronerboop
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ms-dashboard
          push: true
          tags: carlospatronerboop/ms-dashboard:latest

  deploy-to-aks:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: grupo-k8s-mexico
          cluster-name: cluster-uteq

      - name: Deploy to AKS
        run: |
          kubectl apply -f ms-dashboard/k8s/deployment.yaml
          kubectl apply -f ms-dashboard/k8s/service.yaml